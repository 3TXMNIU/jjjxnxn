<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baron Neon Downloader</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --card-bg: #111;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header {
            width: 100%; padding: 30px 0; text-align: center; font-size: 28px; font-weight: bold;
            color: #fff; text-transform: uppercase;
            border-bottom: 2px solid var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        .container {
            width: 90%; max-width: 400px; margin-top: 60px;
            background: var(--card-bg); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(188, 19, 254, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); text-align: center;
        }

        input {
            width: 100%; padding: 18px; border-radius: 50px; border: 2px solid #333;
            background: #1a1a1a; color: white; font-size: 16px;
            outline: none; box-sizing: border-box; text-align: center; margin-bottom: 25px;
        }

        input:focus { border-color: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }

        .btn {
            width: 100%; padding: 18px; border-radius: 50px; border: none;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-purple {
            background: transparent; color: var(--neon-purple); border: 2px solid var(--neon-purple);
        }

        .btn-purple:hover { background: var(--neon-purple); color: white; box-shadow: 0 0 20px var(--neon-purple); }

        .loader {
            display: none; border: 4px solid #222; border-top: 4px solid var(--neon-purple);
            border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">Baron Downloader</div>

<div class="container">
    <input type="text" id="urlInput" placeholder="الصق رابط الفيديو هنا...">
    
    <button class="btn btn-purple" id="mainBtn" onclick="startDownload()">تحميل MP3 الآن</button>

    <div class="loader" id="loader"></div>
    <p id="status">جاهز للتحميل يا بطل</p>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }

    function startDownload() {
        const urlInput = document.getElementById('urlInput');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const url = urlInput.value;

        if (!url) { status.innerText = "أدخل الرابط أولاً!"; return; }

        status.innerText = "جاري تحويل الرابط... انتظر قليلاً";
        loader.style.display = "block";

        // استخدام محرك (9xbuddy) لأنه الأقوى والأكثر استقراراً في تجاوز الحجب
        const downloadUrl = `https://9xbuddy.com/download?url=${encodeURIComponent(url)}`;
        
        setTimeout(() => {
            loader.style.display = "none";
            status.innerText = "تمت المعالجة! سيفتح التحميل الآن.";
            
            // فتح صفحة التحميل في نافذة جديدة لضمان الوصول
            window.location.href = downloadUrl;
        }, 1500);
    }

    // استقبال المشاركة من يوتيوب
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const sharedText = params.get('text') || params.get('url');
        if (sharedText) {
            const foundUrl = sharedText.match(/\bhttps?:\/\/\S+/gi);
            if (foundUrl) {
                document.getElementById('urlInput').value = foundUrl[0];
                startDownload();
            }
        }
    });
</script>

</body>
</html>
