<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baron Neon Downloader</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#bc13fe">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0a;
            --card-bg: #141414;
            --text-color: #ffffff;
            --neon-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header {
            width: 100%; padding: 25px 0; text-align: center; font-size: 24px; font-weight: bold;
            color: #fff; text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 2px solid var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            text-shadow: var(--neon-shadow);
        }

        .container {
            width: 90%; max-width: 400px; margin-top: 50px;
            background: var(--card-bg); padding: 35px; border-radius: 25px;
            border: 1px solid rgba(188, 19, 254, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); text-align: center;
        }

        input {
            width: 100%; padding: 15px; border-radius: 50px; border: 2px solid #333;
            background: rgba(255, 255, 255, 0.05); color: white; font-size: 16px;
            outline: none; box-sizing: border-box; text-align: center; transition: 0.3s;
        }

        input:focus { border-color: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }

        .btn {
            width: 100%; padding: 16px; border-radius: 50px; border: none;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 20px; text-transform: uppercase;
        }

        .btn-process {
            background: transparent; color: var(--neon-purple); border: 2px solid var(--neon-purple);
        }

        .btn-process:hover { background: var(--neon-purple); color: white; box-shadow: var(--neon-shadow); }

        /* زر التحميل الحقيقي الذي سيظهر لاحقاً */
        #finalDownloadBtn {
            display: none; background: #00ff00; color: black; border: none;
            box-shadow: 0 0 15px #00ff00; animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .loader {
            display: none; border: 4px solid #222; border-top: 4px solid var(--neon-purple);
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #status { margin-top: 15px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">Baron Neon Downloader</div>

<div class="container">
    <input type="text" id="urlInput" placeholder="الصق رابط يوتيوب هنا...">
    
    <button class="btn btn-process" id="mainBtn" onclick="processVideo()">تحويل الرابط</button>
    
    <a id="finalDownloadLink" href="" target="_blank" style="text-decoration: none;">
        <button class="btn" id="finalDownloadBtn">اضغط لبدء التحميل الآن ✅</button>
    </a>

    <div class="loader" id="loader"></div>
    <p id="status">جاهز لخدمتك يا بارون</p>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }

    function processVideo() {
        const url = document.getElementById('urlInput').value;
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const mainBtn = document.getElementById('mainBtn');
        const finalBtn = document.getElementById('finalDownloadBtn');
        const finalLink = document.getElementById('finalDownloadLink');

        if (!url) { status.innerText = "أدخل رابطاً أولاً!"; return; }

        status.innerText = "جاري جلب الملف من يوتيوب...";
        loader.style.display = "block";
        mainBtn.style.display = "none";
        finalBtn.style.display = "none";

        // المحرك (API)
        const downloadUrl = `https://api.vevioz.com/api/button/mp3?url=${encodeURIComponent(url)}`;
        
        setTimeout(() => {
            loader.style.display = "none";
            status.innerText = "تم تجهيز الملف بنجاح!";
            finalLink.href = downloadUrl;
            finalBtn.style.display = "block"; // إظهار زر التحميل الحقيقي
        }, 2500);
    }

    // استقبال الرابط من المشاركة
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const sharedText = params.get('text') || params.get('url');
        if (sharedText) {
            const foundUrl = sharedText.match(/\bhttps?:\/\/\S+/gi);
            if (foundUrl) {
                document.getElementById('urlInput').value = foundUrl[0];
                processVideo();
            }
        }
    });
</script>

</body>
</html>
