<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baron Downloader</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffc107">
    <style>
        :root { --primary: #ffc107; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { 
            background: var(--dark-bg); color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header { 
            width: 100%; background: var(--primary); color: black; 
            padding: 20px 0; text-align: center; font-size: 22px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }
        .container { 
            width: 90%; max-width: 450px; margin-top: 50px; 
            background: var(--card-bg); padding: 30px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        input { 
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #333; 
            background: #252525; color: white; font-size: 16px; outline: none; 
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }
        .btn-download { 
            width: 100%; padding: 15px; margin-top: 20px; border-radius: 15px; 
            border: none; background: var(--primary); color: black; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-download:active { transform: scale(0.95); }
        .status { margin-top: 20px; color: #bbb; font-size: 14px; min-height: 20px; }
        
        /* Loader Animation */
        .loader { 
            display: none; border: 4px solid #333; border-top: 4px solid var(--primary); 
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; 
            margin: 15px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">Baron Downloader</div>

<div class="container">
    <p>شارك الرابط من يوتيوب أو الصقه هنا</p>
    <input type="text" id="urlInput" placeholder="رابط الفيديو...">
    <button class="btn-download" onclick="startDownload()">تحميل بصيغة MP3</button>
    
    <div id="loader" class="loader"></div>
    <div id="status" class="status">جاهز للتحميل</div>
</div>

<script>
    // تسجيل الـ Service Worker لضمان عمل التطبيق
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }

    // استقبال الرابط عند المشاركة من يوتيوب
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const sharedText = urlParams.get('text') || urlParams.get('url');
        
        if (sharedText) {
            const videoLink = sharedText.match(/\bhttps?:\/\/\S+/gi);
            if (videoLink) {
                document.getElementById('urlInput').value = videoLink[0];
                document.getElementById('status').innerText = "تم استلام الرابط بنجاح!";
                // يمكنك تفعيل التحميل التلقائي هنا بإضافة startDownload();
            }
        }
    });

    function startDownload() {
        const url = document.getElementById('urlInput').value;
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        if (!url) {
            status.innerText = "يرجى إدخال الرابط أولاً!";
            return;
        }

        status.innerText = "جاري معالجة الرابط... انتظر قليلاً";
        loader.style.display = "block";

        // استخدام محرك (9xbuddy) لأنه يوفر صفحة تحميل نظيفة وخيارات متعددة
        const downloadUrl = `https://9xbuddy.com/download?url=${encodeURIComponent(url)}`;
        
        setTimeout(() => {
            loader.style.display = "none";
            status.innerText = "اكتملت المعالجة! اختر الجودة من الصفحة التالية.";
            window.location.href = downloadUrl;
        }, 1500);
    }
</script>

</body>
</html>
