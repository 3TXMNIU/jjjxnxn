<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل الصوت</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 85%; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #ff0000; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>تحميل صوت من يوتيوب</h2>
        <input type="text" id="urlInput" placeholder="الرابط سيظهر هنا تلقائياً">
        <button onclick="download()">تحميل MP3</button>
        <p id="msg"></p>
    </div>

    <script>
        // كود استقبال الرابط من "مشاركة" يوتيوب
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const sharedText = params.get('text') || params.get('url');
            if (sharedText) {
                const foundUrl = sharedText.match(/\bhttps?:\/\/\S+/gi);
                if (foundUrl) document.getElementById('urlInput').value = foundUrl[0];
            }
        });

        function download() {
            const link = document.getElementById('urlInput').value;
            if(!link) return alert("أدخل رابطاً أولاً");
            document.getElementById('msg').innerText = "جاري التحويل...";
            // رابط الخدمة الخارجية للتحميل
            window.location.href = `https://api.vevioz.com/api/button/mp3?url=${encodeURIComponent(link)}`;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
